name: sync-dooray-api-docs

on:
  schedule:
    - cron: '0 1 * * *' # daily at 01:00 UTC = 10:00 KST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch Dooray API doc pages
        id: fetch
        run: |
          set -uo pipefail

          OUT_DIR='docs/external'
          mkdir -p "$OUT_DIR"

          # лҸҷкё°нҷ” лҢҖмғҒ нҺҳмқҙм§Җ: pageId | slug | outFile (repo лЈЁнҠё кё°мӨҖ мғҒлҢҖ кІҪлЎң)
          # мғҲ нҺҳмқҙм§ҖлҘј м¶”к°Җн•ҳл Өл©ҙ мқҙ л°°м—ҙм—җ н•ң мӨ„л§Ң лҚ”н•ҳл©ҙ лҗ©лӢҲлӢӨ.
          PAGES=(
            '2939987647631384419|service|docs/external/dooray-api.md'
            '2939992834004986234|messenger-direct-send|docs/external/dooray-api-messenger-direct-send.md'
            '2939993203869661812|drive-guide|docs/external/dooray-api-drive-guide.md'
            '3817617091196252578|file-transfer-guide|docs/external/dooray-api-file-transfer-guide.md'
          )

          RESULTS_FILE=$(mktemp)

          # н•ң нҺҳмқҙм§Җ fetch. кІ°кіјлҠ” RESULTS_FILE м—җ TSV н•ң мӨ„лЎң append н•©лӢҲлӢӨ.
          # TSV м»¬лҹј: slug, pageId, outFile, status, subject, breadcrumb, updatedAt, bodyChars, outSize, diffSummary, reason
          # status лҠ” ok-changed | ok-unchanged | skipped мӨ‘ н•ҳлӮҳ.
          fetch_page() {
            local page_id="$1" slug="$2" out_file="$3"
            local url="https://helpdesk.dooray.com/v2/wapi/shared-tree/9wWo-xwiR66BO5LGshgVTg/pages/${page_id}"

            echo "::group::[$slug] Request"
            echo "URL : $url"
            echo "OUT : $out_file"
            echo "::endgroup::"

            local response_file http_code response_size
            response_file=$(mktemp)
            http_code=$(curl -sS \
              --max-time 60 \
              --write-out '%{http_code}' \
              --output "$response_file" \
              "$url" || echo '000')
            response_size=$(wc -c < "$response_file" | tr -d ' ')

            echo "::group::[$slug] HTTP response"
            echo "status     : $http_code"
            echo "body bytes : $response_size"
            echo "::endgroup::"

            if [ "$http_code" != "200" ]; then
              echo "::warning::[$slug] Failed to fetch upstream (HTTP $http_code). Skipping this page."
              echo "----- first 500 bytes of body -----"
              head -c 500 "$response_file" || true
              echo
              printf '%s\t%s\t%s\tskipped\t\t\t\t\t\t\tHTTP %s\n' \
                "$slug" "$page_id" "$out_file" "$http_code" >> "$RESULTS_FILE"
              return 0
            fi

            local response
            response=$(cat "$response_file")

            if ! echo "$response" | jq -e '.header' > /dev/null 2>&1; then
              echo "::warning::[$slug] Response is not the expected JSON envelope. Skipping this page."
              echo "----- first 500 bytes of body -----"
              head -c 500 "$response_file" || true
              echo
              printf '%s\t%s\t%s\tskipped\t\t\t\t\t\t\tbad JSON envelope\n' \
                "$slug" "$page_id" "$out_file" >> "$RESULTS_FILE"
              return 0
            fi

            local is_successful result_code result_message
            is_successful=$(echo "$response" | jq -r '.header.isSuccessful')
            result_code=$(echo "$response" | jq -r '.header.resultCode')
            result_message=$(echo "$response" | jq -r '.header.resultMessage')

            echo "::group::[$slug] API header"
            echo "isSuccessful  : $is_successful"
            echo "resultCode    : $result_code"
            echo "resultMessage : $result_message"
            echo "::endgroup::"

            if [ "$is_successful" != "true" ]; then
              echo "::warning::[$slug] Dooray returned isSuccessful=$is_successful (resultCode=$result_code, resultMessage=$result_message). Skipping this page."
              printf '%s\t%s\t%s\tskipped\t\t\t\t\t\t\tisSuccessful=%s resultCode=%s\n' \
                "$slug" "$page_id" "$out_file" "$is_successful" "$result_code" >> "$RESULTS_FILE"
              return 0
            fi

            local page_id_resp subject created_at updated_at mime_type content_id breadcrumb body body_chars body_lines
            page_id_resp=$(echo "$response" | jq -r '.result.content.pageId')
            subject=$(echo "$response" | jq -r '.result.content.subject')
            created_at=$(echo "$response" | jq -r '.result.content.createdAt')
            updated_at=$(echo "$response" | jq -r '.result.content.updatedAt')
            mime_type=$(echo "$response" | jq -r '.result.content.body.mimeType')
            content_id=$(echo "$response" | jq -r '.result.content.body.contentId')
            breadcrumb=$(echo "$response" | jq -r '[.result.content.breadcrumb[].subject] | join(" / ")')
            body=$(echo "$response" | jq -r '.result.content.body.content')
            body_chars=$(printf '%s' "$body" | wc -c | tr -d ' ')
            body_lines=$(printf '%s\n' "$body" | wc -l | tr -d ' ')

            echo "::group::[$slug] Page metadata"
            echo "pageId     : $page_id_resp"
            echo "subject    : $subject"
            echo "breadcrumb : $breadcrumb"
            echo "mimeType   : $mime_type"
            echo "contentId  : $content_id"
            echo "createdAt  : $created_at"
            echo "updatedAt  : $updated_at"
            echo "body chars : $body_chars"
            echo "body lines : $body_lines"
            echo "::endgroup::"

            {
              echo '---'
              echo "source: $url"
              echo "pageId: \"$page_id_resp\""
              echo "subject: \"$subject\""
              echo "breadcrumb: \"$breadcrumb\""
              echo "dooray_created_at: \"$created_at\""
              echo "dooray_updated_at: \"$updated_at\""
              echo 'note: |'
              echo '  мқҙ нҢҢмқјмқҖ .github/workflows/sync-dooray-api-docs.yml лЎң мһҗлҸҷ к°ұмӢ лҗ©лӢҲлӢӨ.'
              echo '  мҶҗмңјлЎң нҺём§‘н•ҳм§Җ л§Ҳм„ёмҡ”. м—…мҠӨнҠёлҰјмқҙ к°ұмӢ лҗҳл©ҙ bot/dooray-api-docs лёҢлһңм№ҳм—җ PR мқҙ мһҗлҸҷмңјлЎң м—ҙлҰҪлӢҲлӢӨ.'
              echo '---'
              echo
              printf '%s\n' "$body"
            } > "$out_file"

            local out_size out_lines
            out_size=$(wc -c < "$out_file" | tr -d ' ')
            out_lines=$(wc -l < "$out_file" | tr -d ' ')

            # мӢ к·ң нҢҢмқјлҸ„ diff м—җ нҸ¬н•ЁлҗҳлҸ„лЎқ intent-to-add лЎң мқёлҚұмҠӨм—җ л“ұлЎқн•ң л’Ө ліҖкІҪ м—¬л¶ҖлҘј нҢҗм •н•©лӢҲлӢӨ.
            git add --intent-to-add "$out_file" 2>/dev/null || true
            local diff_stat changed diff_summary status
            diff_stat=$(git diff --shortstat -- "$out_file" | sed 's/^ *//')
            if [ -z "$diff_stat" ]; then
              changed='false'; diff_summary='ліҖкІҪ м—ҶмқҢ'; status='ok-unchanged'
            else
              changed='true'; diff_summary="$diff_stat"; status='ok-changed'
            fi

            echo "::group::[$slug] Output file"
            echo "path      : $out_file"
            echo "bytes     : $out_size"
            echo "lines     : $out_lines"
            echo "changed   : $changed"
            echo "diff stat : $diff_summary"
            echo "::endgroup::"

            printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t\n' \
              "$slug" "$page_id" "$out_file" "$status" \
              "$subject" "$breadcrumb" "$updated_at" \
              "$body_chars" "$out_size" "$diff_summary" >> "$RESULTS_FILE"
          }

          for entry in "${PAGES[@]}"; do
            IFS='|' read -r pid slug outf <<< "$entry"
            fetch_page "$pid" "$slug" "$outf"
          done

          # нҺҳмқҙм§Җлі„ кІ°кіјлҘј м§‘кі„н•ҙ step м¶ңл Ҙ / Job Summary / PR ліёл¬ёмқ„ л§Ңл“ӯлӢҲлӢӨ.
          any_changed='false'
          all_failed='true'
          changed_slugs=()
          unchanged_slugs=()
          skipped_slugs=()

          while IFS=$'\t' read -r slug pid outf status subject breadcrumb updated_at body_chars out_size diff_summary reason; do
            case "$status" in
              ok-changed)
                any_changed='true'
                all_failed='false'
                changed_slugs+=("$slug")
                ;;
              ok-unchanged)
                all_failed='false'
                unchanged_slugs+=("$slug")
                ;;
              skipped)
                skipped_slugs+=("$slug")
                ;;
            esac
          done < "$RESULTS_FILE"

          join_csv() {
            # bash мқҳ "${arr[*]}" лҠ” IFS мқҳ мІ« кёҖмһҗл§Ң кө¬л¶„мһҗлЎң м“°лҜҖлЎң ', ' к°ҷмқҖ лӢӨмӨ‘-л¬ёмһҗ кө¬л¶„мһҗлҠ” м§Ғм ‘ н•©міҗмӨҚлӢҲлӢӨ.
            local sep="$1"; shift
            if [ "$#" -eq 0 ]; then echo ''; return 0; fi
            local s
            s=$(printf "%s${sep}" "$@")
            echo "${s%${sep}}"
          }

          changed_csv=''
          if [ "${#changed_slugs[@]}" -gt 0 ]; then changed_csv=$(join_csv ', ' "${changed_slugs[@]}"); fi
          unchanged_csv=''
          if [ "${#unchanged_slugs[@]}" -gt 0 ]; then unchanged_csv=$(join_csv ', ' "${unchanged_slugs[@]}"); fi
          skipped_csv=''
          if [ "${#skipped_slugs[@]}" -gt 0 ]; then skipped_csv=$(join_csv ', ' "${skipped_slugs[@]}"); fi

          echo "::group::Aggregate"
          echo "any_changed   : $any_changed"
          echo "all_failed    : $all_failed"
          echo "changed   ($(printf %d ${#changed_slugs[@]}))   : $changed_csv"
          echo "unchanged ($(printf %d ${#unchanged_slugs[@]}))   : $unchanged_csv"
          echo "skipped   ($(printf %d ${#skipped_slugs[@]}))   : $skipped_csv"
          echo "::endgroup::"

          # мӣҢнҒ¬н”ҢлЎңмҡ° мӢӨн–ү нҺҳмқҙм§Җ мғҒлӢЁ Job Summary
          {
            echo "## рҹ“ҳ Dooray API л¬ём„ң лҸҷкё°нҷ” кІ°кіј"
            echo
            echo "| slug | status | subject | м—…мҠӨнҠёлҰј к°ұмӢ мқј | ліёл¬ё кёҖмһҗ мҲҳ | м¶ңл Ҙ нҢҢмқј нҒ¬кё° | ліҖкІҪ мҡ”м•Ҫ / мӮ¬мң  |"
            echo "| --- | --- | --- | --- | --- | --- | --- |"
            while IFS=$'\t' read -r slug pid outf status subject breadcrumb updated_at body_chars out_size diff_summary reason; do
              case "$status" in
                ok-changed)
                  echo "| \`$slug\` | вң… changed | $subject | \`$updated_at\` | $body_chars | $out_size | $diff_summary |"
                  ;;
                ok-unchanged)
                  echo "| \`$slug\` | рҹҹ° unchanged | $subject | \`$updated_at\` | $body_chars | $out_size | $diff_summary |"
                  ;;
                skipped)
                  echo "| \`$slug\` | вҡ пёҸ skipped | вҖ” | вҖ” | вҖ” | вҖ” | $reason |"
                  ;;
              esac
            done < "$RESULTS_FILE"
            echo
            echo "**н•©кі„**: changed=${#changed_slugs[@]}, unchanged=${#unchanged_slugs[@]}, skipped=${#skipped_slugs[@]}"
          } >> "$GITHUB_STEP_SUMMARY"

          # PR body (only used when any_changed=true)
          PR_BODY_FILE=$(mktemp)
          {
            echo "## рҹ“ҳ Upstream changes detected"
            echo
            echo "This PR automatically syncs Dooray documentation pages after detecting upstream changes."
            echo
            echo "### Changed pages"
            echo
            echo "| slug | subject | breadcrumb | pageId | upstream updated at | body chars | output file size | diff summary |"
            echo "| --- | --- | --- | --- | --- | --- | --- | --- |"
            while IFS=$'\t' read -r slug pid outf status subject breadcrumb updated_at body_chars out_size diff_summary reason; do
              if [ "$status" = "ok-changed" ]; then
                echo "| \`$slug\` | [$subject](https://helpdesk.dooray.com/v2/wapi/shared-tree/9wWo-xwiR66BO5LGshgVTg/pages/$pid) | $breadcrumb | \`$pid\` | \`$updated_at\` | $body_chars | $out_size | \`$diff_summary\` |"
              fi
            done < "$RESULTS_FILE"

            if [ "${#unchanged_slugs[@]}" -gt 0 ]; then
              echo
              echo "### Unchanged"
              echo
              echo "$unchanged_csv"
            fi

            if [ "${#skipped_slugs[@]}" -gt 0 ]; then
              echo
              echo "### вҡ пёҸ Skipped pages"
              echo
              echo "| slug | reason |"
              echo "| --- | --- |"
              while IFS=$'\t' read -r slug pid outf status subject breadcrumb updated_at body_chars out_size diff_summary reason; do
                if [ "$status" = "skipped" ]; then
                  echo "| \`$slug\` | $reason |"
                fi
              done < "$RESULTS_FILE"
            fi

            echo
            echo "**Workflow run log**: [run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } > "$PR_BODY_FILE"

          # Commit message (lists the changed slugs in the body)
          COMMIT_MSG_FILE=$(mktemp)
          {
            echo "chore(docs): Sync Dooray API docs (${changed_csv})"
            echo
            echo "changed   : ${changed_csv}"
            if [ -n "$unchanged_csv" ]; then echo "unchanged : ${unchanged_csv}"; fi
            if [ -n "$skipped_csv" ];   then echo "skipped   : ${skipped_csv}"; fi
          } > "$COMMIT_MSG_FILE"

          # step outputs
          {
            echo "any_changed=$any_changed"
            echo "all_failed=$all_failed"
            echo "changed_slugs=$changed_csv"
            echo "unchanged_slugs=$unchanged_csv"
            echo "skipped_slugs=$skipped_csv"
            echo "changed_count=${#changed_slugs[@]}"
            echo "unchanged_count=${#unchanged_slugs[@]}"
            echo "skipped_count=${#skipped_slugs[@]}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "pr_body<<DOORAY_PR_BODY_EOF"
            cat "$PR_BODY_FILE"
            echo "DOORAY_PR_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "commit_message<<DOORAY_COMMIT_EOF"
            cat "$COMMIT_MSG_FILE"
            echo "DOORAY_COMMIT_EOF"
          } >> "$GITHUB_OUTPUT"

          # лӘЁл“  нҺҳмқҙм§Җк°Җ мӢӨнҢЁн•ң кІҪмҡ° мӣҢнҒ¬н”ҢлЎңмҡ°лҘј мӢӨнҢЁлЎң л§ҲнӮ№н•ҙ silent-failure лҘј л§үмҠөлӢҲлӢӨ.
          if [ "$all_failed" = "true" ]; then
            echo "::error::All ${#PAGES[@]} pages failed to sync."
            exit 1
          fi

      - name: Create or update PR
        if: steps.fetch.outputs.any_changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: bot/dooray-api-docs
          base: main
          commit-message: ${{ steps.fetch.outputs.commit_message }}
          title: 'chore(docs): Sync Dooray API docs'
          body: ${{ steps.fetch.outputs.pr_body }}
          assignees: doinki
          delete-branch: true
